<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Prime Numbers Web Application</title>

</head>
<body>
<h1> This is a prime checker application</h1>
<p> Please enter a number to check if it is a prime:</p>
<div class="input-container">
    <input type="text" id="number-input" placeholder="Enter a number">
    <button id="check-button" class="button">Check</button>
    <p id="result"></p>
</div>

<h2> Extension - Find primes in range:
<button id="range-button">Find primes in range</button>
</h2>

<script src="index.js"></script>

</body>
</html>
